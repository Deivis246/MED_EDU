kind = "web"
previewPath = "/"
title = "MedInterna Educativa"
version = "1.0.0"
id = "artifacts/med-edu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25797

[services.development]
run = "pnpm --filter @workspace/med-edu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/med-edu", "run", "build" ]
publicDir = "artifacts/med-edu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25797"
BASE_PATH = "/"
